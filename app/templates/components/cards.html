{% macro feature_card(title, description, icon='', badge='') %}
<div class="relative flex flex-col items-start p-6 bg-white border border-hairline rounded-lg shadow-sm hover:shadow-md transition-shadow">
    {% if icon %}
    <div class="flex items-center justify-center h-12 w-12 rounded-md bg-canvas text-ink mb-4 border border-hairline">
        {{ icon|safe }}
    </div>
    {% endif %}
    <div class="flex items-center justify-between w-full mb-2">
        <h3 class="text-heading-md text-ink font-semibold">{{ title }}</h3>
        {% if badge %}
        <span class="inline-flex items-center rounded-full bg-canvas px-2.5 py-0.5 text-xs font-medium text-body border border-hairline">
            {{ badge }}
        </span>
        {% endif %}
    </div>
    <p class="text-body-md text-mute flex-grow">
        {{ description }}
    </p>
    {% if caller %}
    <div class="mt-4 w-full">
        {{ caller() }}
    </div>
    {% endif %}
</div>
{% endmacro %}
