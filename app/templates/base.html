<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="InternLink - Web-based Internship Recruitment Platform for Technology Students">
    <title>{% block title %}InternLink{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col bg-canvas text-body font-sans">
    
    <!-- Navbar -->
    {% include 'components/navbar.html' %}
    
    <!-- Flash Messages -->
    {% include 'components/flash.html' %}
    
    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    {% include 'components/footer.html' %}

    <!-- Scripts -->
    {% block extra_js %}{% endblock %}
</body>
</html>
